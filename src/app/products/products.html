<h2 class="text-center mb-4">ProductsđźŚź</h2>

<div class="d-flex flex-wrap justify-content-center gap-4">
  <div class="card" style="width: 18rem;" *ngFor="let prod of productArr">
    <img
      [src]="'http://localhost:5000/uploads/products/' + prod.imageUrl"
      class="card-img-top"
      [alt]="prod.name"
    />

    <div class="card-body ">
      <h5 class="card-title">{{ prod.name }}</h5>
      <p class="card-text">Price: {{ prod.price | currency:'EGP' }}</p>
      <button class="btn ">View</button>
    </div>
  </div>
</div>
