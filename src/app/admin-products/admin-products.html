<div class="container-fluid">

  <div class="d-flex justify-content-between align-items-center mb-4">

    <h2>Products</h2>


  </div>

  <table class="table table-hover">

    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Image</th>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>

      @for(product of products; track product._id){

      <tr><td>{{product._id}}</td>

        <td>
          <img
            [src]="'http://localhost:5000/uploads/products/' + product.imageUrl"
            width="70"
            height="70">
        </td>

        <td>{{product.name}}</td>

        <td>{{product.category}}</td>

        <td>{{product.price}}</td>

        <td>{{product.stock}}</td>

        <td>

          <button class="btn btn-warning btn-sm me-2" [routerLink]="['/admin/update-product/:id',product._id]">
            Edit
          </button>

          <button class="btn1  btn-sm" (click)="deleteProduct(product._id)">
            Delete
          </button>

        </td>

      </tr>

      }

    </tbody>

  </table>

</div>
