<div
  class="position-fixed top-0 start-0 b text-white vh-100 p-3"
  style="width: 250px; z-index: 1000;">

  <h3 class="text-center mb-4">
    Admin Panel
  </h3>

  <ul class="nav nav-pills flex-column mb-auto">

    <li class="nav-item mb-2">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-link text-danger-emphasis">
        <i class="fa-solid fa-chart-line me-2"></i>
        Dashboard
      </a>
    </li>

    <li class="nav-item mb-2">
      <a routerLink="adminproducts" routerLinkActive="active" class="nav-link text-danger-emphasis">
        <i class="fa-solid fa-box me-2"></i>
        Products
      </a>
    </li>

    <li class="nav-item mb-2">
      <a routerLink="addproduct" routerLinkActive="active" class="nav-link text-danger-emphasis">
        <i class="fa-solid fa-box me-2"></i>
        Add Products
      </a>
    </li>

    <li class="nav-item mb-2">
      <a routerLink="getusers" routerLinkActive="active" class="nav-link text-danger-emphasis">
        <i class="fa-solid fa-users me-2"></i>
        Users
      </a>
    </li>

    <li class="nav-item mb-2">
      <a routerLink="/adminorders" routerLinkActive="active" class="nav-link text-danger-emphasis">
        <i class="fa-solid fa-cart-shopping me-2"></i>
        Orders
      </a>
    </li>


  </ul>

  <button class="btn  w-100 mt-auto" (click)="logout()">
    <i class="fa-solid fa-right-from-bracket me-2"></i>
    Logout
  </button>

</div>
