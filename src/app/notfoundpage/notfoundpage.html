<div class="container  notfound vh-100 d-flex justify-content-center align-items-center">
  <div class="text-center">
    <h1 class="display-1 fw-bold text-danger-emphasis">404</h1>

    <h2 class="fw-semibold mt-3 text-danger-emphasis">Oops! Page Not Found</h2>

    <p class="text-muted mt-2 text-white">
      The page you are looking for doesn't exist or has been moved.
    </p>

    <button class="btn rounded-pill px-4 mt-3" (click)="goback()">
      Go Back
    </button>
  </div>
</div>
