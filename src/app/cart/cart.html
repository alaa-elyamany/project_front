<div class="container py-5">

  <h2 class="fw-bold mb-4">Shopping Cart</h2>

  <div class="row">

    <!-- Cart Items -->
    <div class="col-lg-8">

      <div class="card shadow-sm border-0 mb-3" *ngFor="let item of Cart">

        <div class="card-body">

          <div class="row align-items-center">

            <div class="col-md-2">
              <img
                [src]="'http://localhost:5000/uploads/products/' + item.product.imageUrl"
                class="img-fluid rounded">
            </div>

            <div class="col-md-4">
              <h5>{{item.product.name}} </h5>
              <p class="text-muted mb-0">{{ item.product.price | currency:'EGP' }}</p>
            </div>

            <div class="col-md-3">

              <div class="input-group">

                <button class="btn btn-outline-dark text-white" (click)="decreasequantity(item.product._id,item.quantity-1)">-</button>

                <input
                  class="form-control text-center"
                  [value]="item.quantity"
                  readonly>

                <button class="btn btn-outline-dark text-white" (click)="increasequantity(item.product._id,item.quantity+1)">+</button>

              </div>

            </div>

            <div class="col-md-2 text-end fw-bold text-muted">

              {{item.product.price * item.quantity | currency:'EGP'}} 

            </div>

            <div class="col-md-1 text-end">

              <button class="btn btn-outline-danger" (click)=" deleteItem(item.product._id)">
                <i class="fa-solid fa-trash text-white"></i>
              </button>

            </div>

          </div>

        </div>

      </div>

    </div>

    <!-- Summary -->

    <div class="col-lg-4">

      <div class="card shadow border-0 sticky-top">

        <div class="card-body">

          <h4 class="fw-bold mb-4">
            Order Summary
          </h4>



          <div class="d-flex justify-content-between mb-3">
            <span>Total</span>
            <span class="fw-bold text-muted">
              {{price | currency:'EGP'}} 
            </span>
          </div>

          <hr>

          <button class="btn btn-dark w-100" (click)="checkout()">
            Checkout
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
